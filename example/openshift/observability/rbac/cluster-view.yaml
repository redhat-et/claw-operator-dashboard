apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crd-view
rules:
  - apiGroups:
      - apiextensions.k8s.io
    resources:
      - customresourcedefinitions
    verbs:
      - get
      - list
      - watch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observability-crd-view
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: crd-view
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: openclaw-observability-viewers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cr-edit
  labels:
    purpose: allow-custom-resource-management
rules:
  - apiGroups:
      - opentelemetry.io
      - tempo.grafana.com
      - loki.grafana.com
      - observability.openshift.io
      - agentic.openshift.io
      - monitoring.coreos.com
      - monitoring.rhobs
    resources:
      - '*'
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
  - apiGroups:
      - authentication.k8s.io
    resources:
      - tokenreviews
    verbs:
      - create
  - apiGroups:
      - authorization.k8s.io
    resources:
      - subjectaccessreviews
    verbs:
      - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: observability-cr-edit
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cr-edit
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: openclaw-observability-admins
