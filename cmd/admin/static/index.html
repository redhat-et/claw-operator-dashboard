<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenClaw Admin</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <aside class="sidebar">
      <div class="brand">
        <img src="/static/openclaw.svg" alt="" aria-hidden="true">
        <div>OpenClaw<br><span>Admin</span></div>
      </div>
      <nav>
        <a class="active" href="/">Cluster</a>
      </nav>
    </aside>
    <main class="page">
      <header class="topbar">
        <div>
          <p class="eyebrow">Cluster Admin View</p>
          <h1>Claw Inventory</h1>
        </div>
        <div class="account">
          <p class="user" id="user"></p>
          <a class="signout" href="/oauth/sign_out?rd=/">Sign out</a>
        </div>
      </header>

      <section class="toolbar">
        <div class="summary" id="summary"></div>
        <div class="external-links" id="external-links"></div>
      </section>

      <section class="filters">
        <div class="segmented" role="group" aria-label="Management mode">
          <button class="active" type="button" data-mode="all">All</button>
          <button type="button" data-mode="user">User-managed</button>
          <button type="button" data-mode="operator">Operator-managed</button>
          <button type="button" data-mode="not-ready">Not ready</button>
        </div>
        <label class="search">
          <span>Search</span>
          <input id="search" autocomplete="off" placeholder="Namespace, name, provider">
        </label>
      </section>

      <section class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Claw</th>
              <th>Mode</th>
              <th>Status</th>
              <th>Providers</th>
              <th>Config</th>
              <th>Workloads</th>
              <th>Links</th>
            </tr>
          </thead>
          <tbody id="claws"></tbody>
        </table>
        <p class="status" id="status">Loading cluster inventory...</p>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
