apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: openclaw-deployer
  labels:
    app.kubernetes.io/name: openclaw-deployer
spec:
  lookupPolicy:
    local: false
  tags:
    - name: latest
      from:
        kind: DockerImage
        name: quay.io/redhat-et/claw-deployer-ui:latest
      referencePolicy:
        type: Source
      importPolicy:
        scheduled: true
