  - serviceaccount.yaml
  - auth-delegator-clusterrolebinding.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - deployment.yaml
  - service.yaml
  - route.yaml
  - networkpolicy.yaml
images:
  - name: openclaw-admin-dashboard
    newName: quay.io/redhat-et/claw-admin-dashboard
    newTag: latest
