apiVersion: apps/v1
kind: Deployment
metadata:
  name: openclaw-admin-dashboard
  labels:
    app.kubernetes.io/name: openclaw-admin-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openclaw-admin-dashboard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openclaw-admin-dashboard
    spec:
      serviceAccountName: openclaw-admin-dashboard
      containers:
        - name: app
          image: openclaw-admin-dashboard:latest
          imagePullPolicy: Always
          command:
            - /usr/local/bin/openclaw-admin-dashboard
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
        - name: oauth-proxy
          image: quay.io/openshift/origin-oauth-proxy:4.21
          imagePullPolicy: IfNotPresent
          args:
            - --provider=openshift
            - --openshift-service-account=openclaw-admin-dashboard
            - --openshift-sar={"group":"claw.sandbox.redhat.com","resource":"claws","verb":"list"}
            - --upstream=http://127.0.0.1:8080
            - --http-address=0.0.0.0:4180
            - --https-address=
            - --email-domain=*
            - --cookie-secret-file=/etc/proxy/secrets/session_secret
            - --pass-user-headers=true
            - --skip-auth-regex=^/healthz$
          ports:
            - name: oauth
              containerPort: 4180
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: cookie-secret
              mountPath: /etc/proxy/secrets
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: cookie-secret
          secret:
            secretName: openclaw-admin-dashboard-cookie
