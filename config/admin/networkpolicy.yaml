apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openclaw-admin-dashboard-ingress
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openclaw-admin-dashboard
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              network.openshift.io/policy-group: ingress
      ports:
        - protocol: TCP
          port: 4180
