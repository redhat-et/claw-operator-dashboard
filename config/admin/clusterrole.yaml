apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openclaw-admin-dashboard-reader
# The admin dashboard backend reads only Claw resources cluster-wide; the
# Pod/Deployment/ConfigMap/etc. links it renders are browser-side console URLs,
# not server-side reads. Keep this role scoped to exactly what the service
# account uses.
rules:
  - apiGroups:
      - claw.sandbox.redhat.com
    resources:
      - claws
    verbs:
      - get
      - list
      - watch
